databases:
  - name: webprog-blog-db
    plan: free
    databaseName: webprog_blog
    postgresMajorVersion: 16

services:
  - type: web
    name: webprog-blog
    runtime: node
    plan: free
    region: frankfurt
    branch: main
    buildCommand: npm install --omit=dev
    startCommand: npm start
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: webprog-blog-db
          property: connectionString
